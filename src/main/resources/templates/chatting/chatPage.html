<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@100..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/normalize.css}">
    <link rel="stylesheet" th:href="@{/css/general_style.css}">
    <link rel="stylesheet" th:href="@{/css/header_styles.css}">
    <link rel="stylesheet" th:href="@{/css/chatPageStyles.css}">
</head>
<body>
    <div th:replace="general/header :: header"></div>
    <main id="main">
        <div class="container">

            <aside id="chat-list">
                <div id="chat-list-header">
                    Chats
                </div>
                <div th:each="chat : ${chats}" class="chat-item" th:data-user-id="${chat.secondUser.id}">
                    <img th:if="${chat.secondUser.avatar != null}" th:src="@{'/avatars/' + ${chat.secondUser.avatar}}" alt="user-avatar" class="user-avatar">
                    <img th:if="${chat.secondUser.avatar == null}" th:src="@{/img/empty_profile.jpg}" alt="" class="user-avatar">
                    <span th:text="${chat.secondUser.username}"></span>
                </div>
            </aside>

            <section id="chat-window">
                <div id="messages">

                </div>
                <div id="message-input-bar">
                    <input th:if="${receiver != null}"
                           type="text"
                           id="messageInput"
                           th:data-current-user-id="${#authentication.principal.user.getId()}">
                    <button th:if="${receiver != null}" onClick="sendMessage()" id="send-button">Send</button>
                </div>
            </section>
        </div>
    </main>
    <script th:src="@{/scripts/openSelectedChat.js}"></script>
    <div th:replace="general/websocketscripts :: websocketscripts"></div>
</body>
</html>
