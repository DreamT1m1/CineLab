<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.w3.org/1999/xhtml">
<body>
<header th:fragment="header" id="header">
    <div id="logo">
        <a th:href="@{/movies}" id="logo-link">
            <h1>
                CineLab
            </h1>
        </a>
    </div>
    <div id="header-container">
        <form th:action="@{/movies}" method="get" id="search-input-form">
            <label>
                <input type="text" id="search-input" placeholder="Search by title" name="title">
            </label>
        </form>
    </div>
    <div id="auth">
        <div sec:authorize="isAuthenticated()" id="principals">
            <a th:href="@{/{username}(username=${#authentication.principal.user.username})}">
                <span th:text="${#authentication.principal.user.username}"></span>
            </a>
            <br>
            <a th:href="@{/logout}">
                <span>Log out</span>
            </a>
        </div>
        <img sec:authorize="isAuthenticated()" th:if="${#authentication.principal.user.avatar != null}" th:src="@{'/avatars/' + ${#authentication.principal.user.avatar}}" alt="user_avatar" id="header_avatar">
        <div sec:authorize="isAuthenticated()" class="friends_buttons">
            <a th:href="@{/{userName}/friend_invites(userName=${#authentication.principal.user.username})}">
                <img th:src="@{/img/friend_invite_icon.png}" alt="friend_invite_ico" class="friend_related_icons">
            </a>
        </div>
        <div sec:authorize="isAuthenticated()" class="friends_buttons">
            <a th:href="@{/{userName}/friends(userName=${#authentication.principal.user.username})}">
                <img th:src="@{/img/friend_icon.png}" alt="friend_ico" class="friend_related_icons">
            </a>
        </div>
        <div sec:authorize="isAnonymous()" class="auth_auth">
            <a th:href="@{/login}">
                Log In
            </a>
            <br>
            <a th:href="@{/register}" class="auth_auth">
                Register
            </a>
        </div>
    </div>
</header>
</body>
</html>
