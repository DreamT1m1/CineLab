<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.w3.org/1999/xhtml">
    <body>
        <header th:fragment="header" id="header">
            <div id="logo">
                <a th:href="@{/movies}" id="logo-link">
                    <h1>
                        CineLab
                    </h1>
                </a>
            </div>
            <div id="header-container">
                <form th:action="@{/movies}" method="get" id="search-input-form">
                    <label>
                        <input type="text" id="search-input" placeholder="Search by title" name="title">
                    </label>
                </form>
            </div>
            <div id="auth">
                <div sec:authorize="isAuthenticated()">
                    <a th:href="@{/{username}(username=${#authentication.principal.user.username})}">
                        <span th:text="${#authentication.principal.user.username}"></span>
                    </a>
                    <br>
                    <a th:href="@{/logout}">
                        <span>Log out</span>
                    </a>
                </div>
                <div sec:authorize="isAnonymous()">
                    <a th:href="@{/login}">
                        Log In
                    </a>
                </div>
                <div sec:authorize="isAnonymous()">
                    <a th:href="@{/register}">
                        Register
                    </a>
                </div>
            </div>
        </header>
    </body>
</html>
