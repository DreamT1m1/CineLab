<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.getUsername()}"></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@100..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/normalize.css}">
    <link rel="stylesheet" th:href="@{/css/general_style.css}">
    <link rel="stylesheet" th:href="@{/css/header_styles.css}">
    <link rel="stylesheet" th:href="@{/css/account_styles.css}">
</head>
<body>
    <div th:replace="general/header :: header"></div>
    <main id="main">
        <div class="container">
            <h1 th:text="${user.getUsername()}"></h1>
            <div class="watched_movies">
                <ul>
                    <li th:each="movie : ${userWatchedMovies}">
                        <a th:href="@{/movies/{id}(id=${movie.getMovieId()})}">
                            <span th:text="${movie.getTitle()}"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </main>
</body>
</html>
