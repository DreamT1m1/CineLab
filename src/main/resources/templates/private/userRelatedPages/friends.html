<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Friends</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Exa:wght@100..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/normalize.css}">
    <link rel="stylesheet" th:href="@{/css/general_style.css}">
    <link rel="stylesheet" th:href="@{/css/header_styles.css}">
    <link rel="stylesheet" th:href="@{/css/friends_page_styles.css}">
</head>
<body>
    <div th:replace="general/header :: header"></div>

    <main id="main">
        <div class="container">
            <div id="friends_list">
                <div th:each="friend : ${friendsList}" class="friend">
                    <a th:href="@{/{username}(username=${friend.getUsername()})}" class="friend-link">
                        <span th:text="${friend.getUsername()}" class="friend-username"></span>
                        <img th:if="${friend.getAvatar() != null}" th:src="@{'/avatars/' + ${friend.getAvatar()}}" alt="friend-avatar" class="friend-avatar">
                        <img th:if="${friend.getAvatar() == null}" th:src="@{/img/empty_profile.jpg}" alt="friend-avatar" class="friend-avatar">
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="general/websocketscripts :: websocketscripts"></div>
</body>
</html>
